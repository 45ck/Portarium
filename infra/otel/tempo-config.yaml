# Tempo — local Docker Compose tracing backend for Portarium.
#
# Staging/production Helm values provide the remote object-store and metrics
# generation settings. The local compose stack keeps Tempo self-contained so the
# live Cockpit proof is not blocked by unset S3 or Prometheus credentials.

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m
  trace_idle_period: 10s

compactor:
  compaction:
    block_retention: 336h # 14 days

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
