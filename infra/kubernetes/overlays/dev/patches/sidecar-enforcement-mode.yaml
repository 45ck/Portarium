# Sidecar enforcement mode patch for dev environment.
# Dev uses monitor mode — log but do not block egress (ADR-0115 Phase 1).
# Bead: bead-0841
apiVersion: v1
kind: ConfigMap
metadata:
  name: portarium-sidecar-config
  namespace: portarium-agents
data:
  enforcement-mode: |
    enforcementMode: monitor
