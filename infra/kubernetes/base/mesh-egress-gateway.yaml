# Mesh egress gateway — ADR-0115 aligned.
#
# Configures the egress gateway that routes approved outbound traffic from
# agent sidecar proxies to external Systems of Record (SoRs). All external
# traffic from agent pods flows through the sidecar proxy (localhost:15001)
# and then through this egress gateway.
#
# The gateway enforces:
#   - Destination allowlisting (only approved external hosts)
#   - mTLS termination (verifies agent SPIFFE identity)
#   - Structured audit logging (CloudEvents-compatible)
#   - Fail-closed behavior (empty allowlist = deny all)
#
# Bead: bead-0835
# See: docs/internal/adr/ADR-0115-agent-egress-enforcement-model.md

---
# Namespace for the egress gateway (isolated from agent workloads).
apiVersion: v1
kind: Namespace
metadata:
  name: portarium-egress
  labels:
    app.kubernetes.io/part-of: portarium
    portarium.io/plane: egress
    portarium.io/adr: '0115'

---
# ServiceAccount for the egress gateway.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: egress-gateway
  namespace: portarium-egress
  labels:
    app.kubernetes.io/part-of: portarium
    app.kubernetes.io/component: egress-gateway

---
# ConfigMap: egress gateway allowlist and routing rules.
# This is the policy-as-code manifest that defines which external
# destinations are reachable from agent workloads.
apiVersion: v1
kind: ConfigMap
metadata:
  name: egress-gateway-config
  namespace: portarium-egress
  labels:
    app.kubernetes.io/part-of: portarium
    app.kubernetes.io/component: egress-gateway
    portarium.io/adr: '0115'
data:
  # Allowlist of approved external destinations.
  # Each entry defines a host pattern, port, and optional method restrictions.
  # Empty list = deny all external traffic (fail-closed).
  egress-allowlist.yaml: |
    version: "1"
    failMode: closed
    destinations: []
    # Example approved destinations (uncomment as needed):
    # - hostPattern: "api.github.com"
    #   port: 443
    #   protocol: HTTPS
    #   description: "GitHub API — connector actions"
    # - hostPattern: "*.openai.com"
    #   port: 443
    #   protocol: HTTPS
    #   description: "OpenAI API — LLM tool calls"
    # - hostPattern: "*.zammad.com"
    #   port: 443
    #   protocol: HTTPS
    #   allowedMethods: ["GET", "POST", "PUT"]
    #   description: "Zammad — customer support integration"

  # Envoy listener configuration for the egress gateway.
  envoy-config.yaml: |
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901
    static_resources:
      listeners:
        - name: egress_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 15443
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: egress_gateway
                    codec_type: AUTO
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          log_format:
                            json_format:
                              timestamp: "%START_TIME%"
                              destination_host: "%UPSTREAM_HOST%"
                              destination_port: "%UPSTREAM_PORT%"
                              http_method: "%REQ(:METHOD)%"
                              http_path: "%REQ(:PATH)%"
                              response_status: "%RESPONSE_CODE%"
                              latency_ms: "%DURATION%"
                              agent_spiffe_id: "%REQ(X-Portarium-Agent-Spiffe-Id)%"
                              tenant_id: "%REQ(X-Portarium-Tenant-Id)%"
                              workflow_run_id: "%REQ(X-Portarium-Workflow-Run-Id)%"
                              policy_decision: "allow"
                              traceparent: "%REQ(traceparent)%"
                    route_config:
                      name: egress_routes
                      virtual_hosts:
                        - name: deny_all
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              direct_response:
                                status: 403
                                body:
                                  inline_string: '{"error":"egress_denied","message":"No approved destination matched. Configure egress-allowlist.yaml."}'
      clusters: []
      # Dynamic clusters are generated from egress-allowlist.yaml by the
      # egress-gateway controller. Each approved destination gets a cluster
      # with TLS origination and health checking.

---
# Deployment for the egress gateway proxy.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: egress-gateway
  namespace: portarium-egress
  labels:
    app.kubernetes.io/name: egress-gateway
    app.kubernetes.io/part-of: portarium
    app.kubernetes.io/component: egress-gateway
    portarium.io/adr: '0115'
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: egress-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: egress-gateway
        app.kubernetes.io/part-of: portarium
        app.kubernetes.io/component: egress-gateway
        portarium.io/workload: egress-gateway
      annotations:
        portarium.io/adr: '0115'
    spec:
      serviceAccountName: egress-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.32-latest
          args:
            - '-c'
            - '/etc/envoy/envoy-config.yaml'
            - '--service-cluster'
            - 'portarium-egress-gateway'
          ports:
            - name: egress
              containerPort: 15443
              protocol: TCP
            - name: admin
              containerPort: 9901
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: 9901
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 9901
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
      volumes:
        - name: envoy-config
          configMap:
            name: egress-gateway-config
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate

---
# Service for the egress gateway.
apiVersion: v1
kind: Service
metadata:
  name: egress-gateway
  namespace: portarium-egress
  labels:
    app.kubernetes.io/name: egress-gateway
    app.kubernetes.io/part-of: portarium
    app.kubernetes.io/component: egress-gateway
spec:
  selector:
    app.kubernetes.io/name: egress-gateway
  ports:
    - name: egress
      port: 15443
      targetPort: 15443
      protocol: TCP

---
# NetworkPolicy: deny all ingress to egress gateway except from agent
# namespace sidecar proxies.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-gateway-ingress-deny-default
  namespace: portarium-egress
  labels:
    app.kubernetes.io/part-of: portarium
    portarium.io/policy: egress-gateway-ingress
    portarium.io/adr: '0115'
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: egress-gateway
  policyTypes:
    - Ingress
  ingress: []

---
# Allow ingress to egress gateway from agent namespace only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-gateway-ingress-allow-agents
  namespace: portarium-egress
  labels:
    app.kubernetes.io/part-of: portarium
    portarium.io/policy: egress-gateway-ingress
    portarium.io/adr: '0115'
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: egress-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: portarium-agents
      ports:
        - protocol: TCP
          port: 15443

---
# Allow egress from egress gateway to external destinations (HTTPS only).
# The gateway is the only component permitted to make actual external calls.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-gateway-egress-allow-external
  namespace: portarium-egress
  labels:
    app.kubernetes.io/part-of: portarium
    portarium.io/policy: egress-gateway-egress
    portarium.io/adr: '0115'
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: egress-gateway
  policyTypes:
    - Egress
  egress:
    # External HTTPS destinations.
    - ports:
        - protocol: TCP
          port: 443
    # DNS resolution for external hostnames.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
